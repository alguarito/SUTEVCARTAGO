  <script>
    // Capturador de errores global para diagnóstico inmediato en pantalla
    window.addEventListener('error', function(e) {
      const errDiv = document.createElement('div');
      errDiv.style.position = 'fixed';
      errDiv.style.bottom = '10px';
      errDiv.style.right = '10px';
      errDiv.style.maxWidth = '400px';
      errDiv.style.background = 'rgba(220, 38, 38, 0.95)';
      errDiv.style.color = 'white';
      errDiv.style.padding = '16px';
      errDiv.style.borderRadius = '8px';
      errDiv.style.zIndex = '999999';
      errDiv.style.fontFamily = 'monospace';
      errDiv.style.fontSize = '12px';
      errDiv.style.boxShadow = '0 10px 25px rgba(0,0,0,0.5)';
      errDiv.style.border = '1px solid rgba(255,255,255,0.2)';
      errDiv.innerHTML = `<h4 style="margin:0 0 8px 0;font-size:14px;color:#ffe4e6;">⚠️ Error de Sistema</h4><p style="margin:0 0 8px 0;line-height:1.4;">${e.message}</p><span style="font-size:10px;color:#fca5a5;">${e.filename}:${e.lineno}</span>`;
      document.body.appendChild(errDiv);
    });
  </script>

  <!-- VISTA 3: Lector Móvil Vertical (Exclusivo para Móviles) -->

  <!-- Barra de Controles para el Libro 3D -->
  <div class="control-bar" id="flipbook-controls">
    <div class="section-left">
      <button onclick="jumpToFirstPage()" class="btn-control" title="Primera página">⏪</button>
      <button onclick="turnBack()" class="btn-control" id="btn-prev" title="Página anterior">◀</button>
    </div>
    
    <div class="section-center">
      <div id="page-indicator" class="page-indicator">Cargando revista...</div>
    </div>
    
    <div class="section-right">
      <button onclick="turnForward()" class="btn-control" id="btn-next" title="Página siguiente">▶</button>
      <button onclick="jumpToLastPage()" class="btn-control" title="Última página">⏩</button>
      <button onclick="toggleZoom()" class="btn-control" id="btn-zoom" title="Acercar / Zoom">🔍</button>
      <button onclick="toggleFullscreen()" class="btn-control" title="Pantalla completa">🖥️</button>
    </div>

  <!-- Lógica de Funcionamiento del Libro 3D -->
  <script>
    const totalPages = 23;
    const pages = [];
    
    // Poblamos el array de páginas con las imágenes extraídas y un cache buster de tiempo para forzar recarga Ultra 4K
    const cacheBuster = `?v=${Date.now()}`;
    for (let i = 1; i <= totalPages; i++) {
      pages.push(`assets/images/revista/pagina_${i}.jpg${cacheBuster}`);
    }
    // Añadimos una página vacía/oscura al final para completar las hojas pares
    pages.push("");

    let pageFlip = null;
    let isZoomed = false;

    // Generar Hojas dinámicamente
    function buildBook() {
      const bookContainer = document.getElementById('book');
      bookContainer.innerHTML = '';
      
      pages.forEach((src, idx) => {
        const pageDiv = document.createElement('div');
        pageDiv.className = 'page-face';
        
        // Primera y última páginas se configuran como tapa dura
        if (idx === 0 || idx === pages.length - 1) {
          pageDiv.setAttribute('data-density', 'hard');
        } else {
          pageDiv.setAttribute('data-density', 'soft');
        }
        
        if (src) {
          pageDiv.innerHTML = `<img src="${src}" alt="Página ${idx + 1}" loading="lazy">`;
        } else {
          pageDiv.innerHTML = `<div class="blank-page"></div>`;
        }
        
        bookContainer.appendChild(pageDiv);
      });
      
      // Inicializar St.PageFlip
      try {
        pageFlip = new St.PageFlip(bookContainer, {
          width: 980,      // Ancho base optimizado para evitar sobrecarga de canvas (DPR)
          height: 1266,    // Alto base optimizado para perfecto rendimiento y fluidez
          size: "stretch", // Estirar para llenar el contenedor (escalado responsivo)
          minWidth: 400,
          minHeight: 516,
          maxWidth: 2000,
          maxHeight: 2580,
          drawShadow: true,
          showCover: true, // Efecto portada y contraportada con tapas duras
          usePortrait: true, // Modo retrato dinámico para tablets/móviles
          flippingTime: 800,
          mobileScrollSupport: true
        });
        
        pageFlip.loadFromHTML(document.querySelectorAll('.page-face'));
        
        // Vincular eventos
        pageFlip.on('flip', (e) => {
          updatePageIndicator(e.data);
          playPageTurnSound();
        });
        
        pageFlip.on('changeOrientation', (e) => {
          updatePageIndicator(pageFlip.getCurrentPageIndex());
        });
        
        // Indicador inicial
        updatePageIndicator(0);
        
      } catch (err) {
        console.error("Error al inicializar StPageFlip:", err);
      }
      
      resizeBook();
    }

    // Lógica para girar hacia ADELANTE (Siguiente Página)
    function turnForward() {
      if (pageFlip) {
        pageFlip.turnToNextPage();
      }
    }

    // Lógica para girar hacia ATRÁS (Página Anterior)
    function turnBack() {
      if (pageFlip) {
        pageFlip.turnToPrevPage();
      }
    }

    // Saltar a la Primera Página (Portada)
    function jumpToFirstPage() {
      if (pageFlip) {
        pageFlip.turnToPage(0);
      }
    }

    // Saltar a la Última Página (Contraportada)
    function jumpToLastPage() {
      if (pageFlip) {
        pageFlip.turnToPage(pages.length - 1);
      }
    }

    // Actualiza el indicador visual de las páginas
    function updatePageIndicator(pageIndex) {
      const indicator = document.getElementById('page-indicator');
      const btnPrev = document.getElementById('btn-prev');
      const btnNext = document.getElementById('btn-next');
      
      if (!pageFlip) return;
      
      if (pageIndex === 0) {
        indicator.textContent = `Portada (Pág. 1 de ${totalPages})`;
        btnPrev.style.opacity = "0.4";
        btnPrev.style.pointerEvents = "none";
        btnNext.style.opacity = "1";
        btnNext.style.pointerEvents = "auto";
      } else if (pageIndex === pages.length - 1) {
        indicator.textContent = "Contraportada";
        btnPrev.style.opacity = "1";
        btnPrev.style.pointerEvents = "auto";
        btnNext.style.opacity = "0.4";
        btnNext.style.pointerEvents = "none";
      } else {
        btnPrev.style.opacity = "1";
        btnPrev.style.pointerEvents = "auto";
        btnNext.style.opacity = "1";
        btnNext.style.pointerEvents = "auto";
        
        const orientation = pageFlip.getOrientation();
        if (orientation === "portrait") {
          indicator.textContent = `Pág. ${pageIndex + 1} de ${totalPages}`;
        } else {
          const leftPage = pageIndex + 1;
          const rightPage = pageIndex + 2;
          if (rightPage > totalPages) {
            indicator.textContent = `Pág. ${leftPage} de ${totalPages}`;
          } else {
            indicator.textContent = `Pág. ${leftPage} - ${rightPage} de ${totalPages}`;
          }
        }
      }
    }

    // Efecto de Sonido Procedural de Pasar Página (Web Audio API)
    function playPageTurnSound() {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        
        // Crear búfer de ruido blanco (duración: 0.3 segundos)
        const bufferSize = ctx.sampleRate * 0.3;
        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }
        
        const noise = ctx.createBufferSource();
        noise.buffer = buffer;
        
        // Filtro de paso de banda para emular fricción del papel
        const filter = ctx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.setValueAtTime(700, ctx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(180, ctx.currentTime + 0.3);
        filter.Q.setValueAtTime(2.5, ctx.currentTime);
        
        // Envolvente de volumen (Gain Envelope)
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.001, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.12, ctx.currentTime + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
        
        noise.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);
        
        noise.start();
      } catch (e) {
        console.log("Audio deshabilitado por política del navegador:", e);
      }
    }

    // Ajuste y Escalado Uniforme Responsivo de la Revista
    function resizeBook() {
      const viewport = document.querySelector('.book-viewport');
      const container = document.querySelector('.book-container');
      if (!viewport || !container) return;
      
      const vw = viewport.clientWidth;
      const vh = viewport.clientHeight;
      
      // Dimensiones fijas optimizadas en las que se basa la escala responsiva
      const bookWidth = 1960;
      const bookHeight = 1266;
      
      // Margen responsivo de 40px
      const scaleX = (vw - 40) / bookWidth;
      const scaleY = (vh - 40) / bookHeight;
      let scale = Math.min(scaleX, scaleY);
      
      // Permitimos agrandar hasta un máximo de 1.1x si hay espacio
      scale = Math.min(Math.max(scale, 0.15), 1.1);
      
      if (isZoomed) {
        // Multiplicamos por 2.0 para zoom ultra legible aprovechando los 320 DPI
        container.style.transform = `scale(${scale * 2.0})`;
      } else {
        container.style.transform = `scale(${scale})`;
      }
    }

    // Alternar Zoom
    function toggleZoom() {
      const viewport = document.querySelector('.book-viewport');
      const btn = document.getElementById('btn-zoom');
      
      isZoomed = !isZoomed;
      if (isZoomed) {
        viewport.classList.add('zoomed');
        btn.textContent = '➖';
        btn.title = "Alejar";
      } else {
        viewport.classList.remove('zoomed');
        btn.textContent = '🔍';
        btn.title = "Acercar";
      }
      resizeBook();
    }

    // Pantalla Completa (Fullscreen)
    function toggleFullscreen() {
      const elem = document.documentElement;
      if (!document.fullscreenElement) {
        elem.requestFullscreen().catch(err => {
          console.log(`Error al activar pantalla completa: ${err.message}`);
        });
      } else {
        document.exitFullscreen();
      }
    }

    // Cambiar entre Modo Revista 3D y Vista de PDF Plano
    function toggleViewMode() {
      const flipView = document.getElementById('flipbook-view');
      const flipControls = document.getElementById('flipbook-controls');
      const pdfView = document.getElementById('pdf-view');
      const btnToggle = document.getElementById('btn-toggle-view');
      
      if (flipView.style.display === 'none') {
        // Cambiar a Modo Libro 3D
        flipView.style.display = 'flex';
        flipControls.style.display = 'flex';
        pdfView.style.display = 'none';
        btnToggle.textContent = '📄 Vista Plana PDF';
        resizeBook();
      } else {
        // Cambiar a Vista PDF Plano
        flipView.style.display = 'none';
        flipControls.style.display = 'none';
        pdfView.style.display = 'block';
        btnToggle.textContent = '📖 Modo Libro 3D';
      }
    }

    // Teclas de dirección y Barra Espaciadora para pasar páginas
    document.addEventListener('keydown', (e) => {
      const flipView = document.getElementById('flipbook-view');
      if (flipView && flipView.style.display !== 'none') {
        if (e.key === 'ArrowRight' || e.key === ' ') {
          e.preventDefault();
          turnForward();
        } else if (e.key === 'ArrowLeft') {
          e.preventDefault();
          turnBack();
        }
      }
    });

    // Generar Lector Vertical Móvil
    function buildMobileReader() {
      const container = document.getElementById('mobile-scrolling-view');
      if (!container) return;
      container.innerHTML = '';
      
      // Inyectar tarjeta informativa primero en móvil
      const noticeCard = document.createElement('div');
      noticeCard.className = 'mobile-pdf-notice';
      noticeCard.innerHTML = `
        <div class="mobile-pdf-notice__icon">📄</div>
        <h3>Revista Voces que Transforman</h3>
        <p>Desplázate hacia abajo para ver la revista hoja por hoja. Para usar herramientas de búsqueda, zoom avanzado o lectura en voz alta, abre el documento original.</p>
        <div class="mobile-pdf-notice__actions">
          <a href="assets/docs/voces_que_transforman.pdf" target="_blank" class="btn-top btn-native-pdf">
            <span>⚡ Abrir PDF Original</span>
          </a>
          <a href="assets/docs/voces_que_transforman.pdf" download class="btn-top btn-download-pdf">
            <span>⬇️ Descargar PDF</span>
          </a>
        </div>
      `;
      container.appendChild(noticeCard);
      
      pages.forEach((src, idx) => {
        if (src) {
          const img = document.createElement('img');
          img.src = src;
          img.alt = `Página ${idx + 1}`;
          img.className = 'mobile-magazine-page';
          img.setAttribute('data-page', idx + 1);
          img.loading = "lazy";
          container.appendChild(img);
        }
      });
      
      const indicator = document.getElementById('mobile-page-indicator');
      const observerOptions = {
        root: container,
        rootMargin: '0px',
        threshold: 0.3
      };
      
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const pageNum = entry.target.getAttribute('data-page');
            indicator.textContent = `Página ${pageNum} de ${totalPages}`;
          }
        });
      }, observerOptions);
      
      container.querySelectorAll('.mobile-magazine-page').forEach(img => {
        observer.observe(img);
      });
    }

    // Eventos y carga inicial
    window.addEventListener('resize', resizeBook);
    window.addEventListener('DOMContentLoaded', () => {
      buildBook();
      buildMobileReader();
    });
  </script>

</body>
</html>
